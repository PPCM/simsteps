services:
  app:
    # Image officielle publiée sur Docker Hub (multi-arch) : aucune
    # compilation locale au démarrage rapide. Pour travailler sur le
    # code, construire l'image locale via docker-compose.dev.yml.
    image: ppcm/simsteps:latest
    ports:
      - "${PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgres://simsteps:simsteps@db:5432/simsteps
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: simsteps
      POSTGRES_PASSWORD: simsteps
      POSTGRES_DB: simsteps
    # Port exposé pour le mode développement sans Docker (db seule)
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simsteps -d simsteps"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

volumes:
  pgdata:
