{{- /*
Secret géré par le chart : uniquement si l'utilisateur n'a pas fourni
son propre Secret (database.existingSecret).
*/}}
{{- if not .Values.database.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "simsteps.fullname" . }}
  labels:
    {{- include "simsteps.labels" . | nindent 4 }}
type: Opaque
data:
  DATABASE_URL: {{ include "simsteps.databaseUrl" . | b64enc | quote }}
{{- end }}
